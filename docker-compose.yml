version: '3.9'

# =============================================================
# Docker Compose for URL Shortener — Production Infrastructure
# Run: docker compose up -d
# =============================================================

services:

  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:16-alpine
    container_name: urlshortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: urluser
      POSTGRES_PASSWORD: urlpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urluser -d urlshortener"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis Cache =====
  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

# =============================================================
# After Docker is working:
# 1. Run: docker compose up -d
# 2. In application.yml, uncomment PostgreSQL & Redis dependencies in pom.xml
# 3. Run app with: mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
# =============================================================
